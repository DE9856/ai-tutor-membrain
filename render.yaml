services:
  - type: web
    name: ai-tutor-backend
    runtime: python
    repo: https://github.com/DE9856/ai-tutor-membrain.git
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MEMBRAIN_API_KEY
        sync: false
      - key: MEMBRAIN_BASE_URL
        value: https://mem-brain-api-cutover-v4-production.up.railway.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: USE_MOCK_MODE
        value: false
      - key: MEMBRAIN_SKIP_POLLING
        value: true